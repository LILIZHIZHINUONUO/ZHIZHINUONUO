<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>部门每周运动打卡记录表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f5f7fa;
            padding: 40px;
        }
        .container {
            max-width: 950px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            color: #2d3748;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .operate-box {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        .import-area {
            margin: 15px 0 25px;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            border: 1px solid #d2d6dc;
            border-radius: 6px;
            font-size: 14px;
            resize: none;
        }
        input {
            padding: 9px 14px;
            border: 1px solid #d2d6dc;
            border-radius: 6px;
            font-size: 15px;
            flex: 1;
            min-width: 200px;
        }
        button {
            padding: 9px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        .btn-add {
            background: #3182ce;
            color: white;
        }
        .btn-import {
            background: #2b6cb0;
            color: #fff;
        }
        .btn-export {
            background: #38a169;
            color: white;
        }
        .btn-reset-all {
            background: #e53e3e;
            color: white;
        }
        .btn-reset-single {
            background: #718096;
            color: white;
            padding: 5px 10px;
            font-size: 12px;
        }
        .btn-del {
            background: #c53030;
            color: white;
            padding: 5px 10px;
            font-size: 12px;
        }
        .person-item {
            display: flex;
            align-items: center;
            padding: 16px 12px;
            border-bottom: 1px solid #edf2f7;
            gap: 20px;
        }
        .name {
            width: 140px;
            font-size: 16px;
            color: #2d3748;
            font-weight: 500;
        }
        .dot-group {
            display: flex;
            gap: 16px;
        }
        .dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #a0aec0;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .dot.active {
            background: #38a169;
        }
        .status-tag {
            width: 90px;
            font-weight: bold;
            font-size: 15px;
        }
        .complete {
            color: #38a169;
        }
        .incomplete {
            color: #a0aec0;
        }
        .tip {
            font-size: 13px;
            color: #718096;
            margin-top: 6px;
        }
        .btn-group-row {
            display: flex;
            gap: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>部门每周运动打卡记录表</h1>
        <div class="operate-box">
            <input type="text" id="nameInput" placeholder="输入员工姓名，单个添加">
            <button class="btn-add" onclick="addPerson()">添加人员</button>
            <button class="btn-export" onclick="exportCsv()">导出全部数据</button>
            <button class="btn-reset-all" onclick="resetAll()">重置全部打卡</button>
        </div>

        <div class="import-area">
            <textarea id="batchText" placeholder="批量导入员工姓名，每行输入一个名字
示例：
张三
李四
王五"></textarea>
            <div class="tip">提示：每行一个姓名，重复姓名会自动跳过</div>
            <button class="btn-import" style="margin-top:10px" onclick="batchImport()">批量导入</button>
        </div>

        <div id="listWrap"></div>
    </div>

    <script>
        let personList = JSON.parse(localStorage.getItem("sportRecord")) || [];
        const listWrap = document.getElementById("listWrap");

        function renderList() {
            listWrap.innerHTML = "";
            personList.forEach((item, index) => {
                const div = document.createElement("div");
                div.className = "person-item";
                let statusText = item.count >= 2 
                    ? `<span class="status-tag complete">[已完成]</span>` 
                    : `<span class="status-tag incomplete">[未完成]</span>`;
                let dotHtml = "";
                for(let i=0; i<2; i++){
                    let dotClass = i < item.count ? "dot active" : "dot";
                    dotHtml += `<div class="${dotClass}" onclick="clickDot(${index}, ${i})"></div>`;
                }
                div.innerHTML = `
                    <div class="name">${item.name}</div>
                    <div class="dot-group">${dotHtml}</div>
                    ${statusText}
                    <div class="btn-group-row">
                        <button class="btn-reset-single" onclick="resetSingle(${index})">重置</button>
                        <button class="btn-del" onclick="deletePerson(${index})">删除</button>
                    </div>
                `;
                listWrap.appendChild(div);
            })
        }

        function deletePerson(index) {
            const name = personList[index].name;
            if (!confirm(`确认删除员工【${name}】，删除后数据无法恢复？`)) return;
            personList.splice(index, 1);
            saveData();
            renderList();
        }

        function clickDot(pIndex, dotIndex) {
            const person = personList[pIndex];
            if(dotIndex >= person.count && person.count < 2){
                person.count += 1;
                saveData();
                renderList();
            }
        }

        function addPerson() {
            const input = document.getElementById("nameInput");
            const name = input.value.trim();
            if(!name) return alert("请输入姓名");
            const exist = personList.some(p => p.name === name);
            if(exist) return alert("该人员已存在");
            personList.push({name, count:0});
            input.value = "";
            saveData();
            renderList();
        }

        function batchImport() {
            const text = document.getElementById("batchText").value.trim();
            if(!text) return alert("请粘贴姓名，一行一个");
            const nameArr = text.split(/[\r\n]+/).map(item=>item.trim()).filter(item=>item);
            let addNum = 0;
            nameArr.forEach(name=>{
                const exist = personList.some(p => p.name === name);
                if(!exist){
                    personList.push({name, count:0});
                    addNum++;
                }
            })
            document.getElementById("batchText").value = "";
            saveData();
            renderList();
            alert(`批量导入完成，新增${addNum}人，重复姓名已自动忽略`);
        }

        function exportCsv() {
            let csv = "姓名,打卡次数,完成状态\n";
            personList.forEach(item=>{
                const state = item.count >=2 ? "已完成" : "未完成";
                csv += `${item.name},${item.count},${state}\n`;
            })
            const blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "部门运动打卡记录.csv";
            a.click();
            URL.revokeObjectURL(url);
        }

        function resetSingle(index) {
            personList[index].count = 0;
            saveData();
            renderList();
        }

        function resetAll() {
            if(!confirm("确定清空所有人打卡记录？")) return;
            personList.forEach(p => p.count = 0);
            saveData();
            renderList();
        }

        function saveData() {
            localStorage.setItem("sportRecord", JSON.stringify(personList));
        }

        renderList();
    </script>
</body>
</html>
